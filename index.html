<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Opinion Sur - Transmisión en vivo">
  <title>Opinion Sur - En Vivo</title>
  
  <!-- Fuente Inter (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <!-- Video.js CSS -->
  <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
  
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --accent-red: #ef4444;
      --text-white: #ffffff;
      --text-gray: #94a3b8;
      --brand-blue: #3b82f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 60%);
      color: var(--text-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- HEADER --- */
    header {
      width: 100%;
      padding: 20px;
      text-align: center;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .brand h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-icon {
      font-size: 1.5rem;
    }

    .subtitle {
      color: var(--text-gray);
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* --- MAIN CONTENT --- */
    main {
      width: 100%;
      max-width: 1100px;
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 6px 16px;
      border-radius: 50px;
      color: var(--accent-red);
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      background-color: var(--accent-red);
      border-radius: 50%;
      box-shadow: 0 0 0 rgba(239, 68, 68, 0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    /* Video Card */
    .video-wrapper {
      width: 100%;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .video-js {
      width: 100%;
      height: auto;
      aspect-ratio: 16/9;
    }
    
    /* Customizing Player Colors */
    .video-js .vjs-big-play-button {
      background-color: rgba(59, 130, 246, 0.8);
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      line-height: 60px;
      font-size: 30px;
    }

    /* Social Bar */
    .social-bar {
      display: flex;
      gap: 15px;
      margin-top: 10px;
    }

    .social-link {
      text-decoration: none;
      color: var(--text-gray);
      font-size: 0.9rem;
      padding: 8px 16px;
      background: var(--bg-card);
      border-radius: 8px;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .social-link:hover {
      color: var(--text-white);
      background: var(--brand-blue);
      transform: translateY(-2px);
    }

    /* --- FOOTER --- */
    footer {
      width: 100%;
      padding: 20px;
      text-align: center;
      color: var(--text-gray);
      font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .brand h1 { font-size: 1.4rem; }
      main { padding: 15px; }
      .video-wrapper { border-radius: 8px; }
    }
  </style>
</head>
<body>

  <!-- Encabezado -->
  <header>
    <div class="brand">
      <span class="brand-icon">🎙️</span> <!-- Icono de micrófono/onda -->
      <h1>OPINION SUR</h1>
    </div>
    <div class="subtitle">Multimedios en Vivo</div>
  </header>

  <!-- Contenido Principal -->
  <main>
    
    <!-- Indicador EN VIVO -->
    <div class="status-badge">
      <div class="pulse"></div>
      EN VIVO
    </div>

    <!-- Reproductor -->
    <div class="video-wrapper">
      <video
        id="my-video"
        class="video-js vjs-big-play-centered vjs-fluid"
        controls
        preload="auto"
        muted
        autoplay
        playsinline
        poster=""
      >
        <source src="https://183.bozztv.com/giatv/giatv-opinionsurc/opinionsurc/playlist.m3u8" type="application/x-mpegURL">
        <p class="vjs-no-js">
          Para ver este video, por favor habilita JavaScript y considera actualizar a un navegador web que 
          <a href="https://videojs.com/html5-video-support/" target="_blank">soporte video HTML5</a>
        </p>
      </video>
    </div>

    <!-- Barra de Redes Sociales (Puedes editar los enlaces href="#") -->
    <div class="social-bar">
      <a href="#" class="social-link" target="_blank">📘 Facebook</a>
      <a href="#" class="social-link" target="_blank">📸 Instagram</a>
      <a href="#" class="social-link" target="_blank">▶️ YouTube</a>
    </div>

  </main>

  <!-- Pie de página -->
  <footer>
    <p>© 2026 Opinion Sur Multimedios. Todos los derechos reservados.</p>
    <p style="margin-top:5px; opacity: 0.6;">Transmisión digital de alta calidad</p>
  </footer>

  <!-- Video.js Script -->
  <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
  <script>
    var player = videojs('my-video', {
      html5: {
        hls: {
          enableLowInitialPlaylist: true,
          smoothQualityChange: true
        }
      },
      fluid: true,
      responsive: true
    });
  </script>
</body>
</html>
